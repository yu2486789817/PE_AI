<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat 测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .box {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #333; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover { background: #5a6fd6; }
        button.green { background: #28a745; }
        button.red { background: #dc3545; }
        .output {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            font-family: inherit;
            line-height: 1.6;
        }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .status.ok { background: #28a745; }
        .status.err { background: #dc3545; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
    </style>
</head>
<body>
    <div class="box">
        <h2>配置</h2>
        <div class="row">
            <div>
                <label>服务地址</label>
                <input type="text" id="baseUrl" value="http://localhost:5000">
            </div>
            <div>
                <label>用户ID</label>
                <input type="text" id="userId" value="test_user">
            </div>
            <div>
                <label>角色</label>
                <select id="role">
                    <option value="student">学生</option>
                    <option value="teacher">教师</option>
                </select>
            </div>
        </div>
        <button type="button" id="checkBtn"><span class="status" id="statusDot"></span>检测服务</button>
    </div>

    <div class="box">
        <h2>AI 聊天</h2>
        <button type="button" id="newBtn">新建会话</button>
        <button type="button" id="loadBtn" class="green">加载会话</button>
        <button type="button" id="clearBtn" class="red">清空会话</button>
        <div id="chatOutput" class="output">点击「新建会话」开始聊天</div>
        <div class="row" style="margin-top:10px;">
            <div style="flex:3;"><input type="text" id="msgInput" placeholder="输入消息..."></div>
            <div style="flex:1;"><button type="button" id="sendBtn" style="width:100%;">发送</button></div>
        </div>
    </div>

    <div class="box">
        <h2>AI 分析报告</h2>
        <div class="row">
            <div><label>学生ID</label><input type="text" id="studentId"></div>
            <div><label>作业ID</label><input type="text" id="homeworkId"></div>
            <div>
                <label>类型</label>
                <select id="analysisType">
                    <option value="homework_feedback">作业反馈</option>
                    <option value="personalized_tips">个性化建议</option>
                </select>
            </div>
        </div>
        <button type="button" id="genBtn">生成报告</button>
        <button type="button" id="queryBtn" class="green">查询报告</button>
        <div id="reportOutput" class="output">生成报告后结果将显示在这里...</div>
    </div>

    <script>
        // 防止任何按钮触发表单提交导致页面刷新
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                });
            });
        });

        var sessionId = null;

        function api(path) {
            return document.getElementById('baseUrl').value + '/api' + path;
        }

        function log(el, msg, append) {
            if (append) {
                el.textContent += '\n' + msg;
            } else {
                el.textContent = msg;
            }
        }

        // 检测服务
        document.getElementById('checkBtn').onclick = function() {
            fetch(api('/models'))
                .then(r => r.json())
                .then(d => {
                    document.getElementById('statusDot').className = 'status ok';
                })
                .catch(e => {
                    document.getElementById('statusDot').className = 'status err';
                });
        };

        // 新建会话
        document.getElementById('newBtn').onclick = function() {
            var uid = document.getElementById('userId').value;
            var role = document.getElementById('role').value;
            var out = document.getElementById('chatOutput');
            log(out, '正在创建会话...');

            fetch(api('/sessions'), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: uid, model: 'local', role: role})
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    sessionId = d.data.session_id;
                    log(out, 'AI: ' + d.data.welcome_message.content);
                } else {
                    log(out, '错误: ' + d.error);
                }
            })
            .catch(e => log(out, '请求失败: ' + e.message));
        };

        // 加载会话
        document.getElementById('loadBtn').onclick = function() {
            var uid = document.getElementById('userId').value;
            var out = document.getElementById('chatOutput');
            log(out, '正在加载会话...');

            fetch(api('/sessions/user/' + uid))
            .then(r => r.json())
            .then(d => {
                if (d.success && d.data) {
                    sessionId = d.data.session_id;
                    var msgs = d.data.messages.map(m => (m.role === 'user' ? '我' : 'AI') + ': ' + m.content);
                    log(out, msgs.join('\n') || '暂无消息');
                } else {
                    log(out, '没有找到会话');
                }
            })
            .catch(e => log(out, '请求失败: ' + e.message));
        };

        // 清空会话
        document.getElementById('clearBtn').onclick = function() {
            if (!sessionId) return alert('请先创建会话');
            var out = document.getElementById('chatOutput');

            fetch(api('/sessions/' + sessionId + '/clear'), {method: 'POST'})
            .then(() => log(out, '会话已清空'))
            .catch(e => log(out, '清空失败: ' + e.message));
        };

        // 发送消息
        document.getElementById('sendBtn').onclick = function() {
            if (!sessionId) return alert('请先创建会话');
            var msg = document.getElementById('msgInput').value;
            if (!msg) return;
            var out = document.getElementById('chatOutput');

            document.getElementById('msgInput').value = '';
            log(out, '我: ' + msg, true);
            log(out, 'AI 正在思考...', true);

            fetch(api('/sessions/' + sessionId + '/messages'), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            })
            .then(r => r.json())
            .then(d => {
                var lines = out.textContent.split('\n');
                lines.pop();
                out.textContent = lines.join('\n');
                if (d.success) {
                    log(out, 'AI: ' + d.data.response, true);
                } else {
                    log(out, '错误: ' + d.error, true);
                }
            })
            .catch(e => {
                var lines = out.textContent.split('\n');
                lines.pop();
                out.textContent = lines.join('\n');
                log(out, '请求失败: ' + e.message, true);
            });
        };

        // 回车发送 - 阻止默认行为防止页面刷新
        document.getElementById('msgInput').onkeydown = function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();  // 阻止默认行为
                document.getElementById('sendBtn').click();
            }
        };

        // 生成报告
        document.getElementById('genBtn').onclick = function() {
            var sid = document.getElementById('studentId').value;
            var hid = document.getElementById('homeworkId').value;
            var type = document.getElementById('analysisType').value;
            var out = document.getElementById('reportOutput');

            if (!sid) return alert('请输入学生ID');
            if (type === 'homework_feedback' && !hid) return alert('作业反馈需要作业ID');

            log(out, '正在生成报告...');

            var data = {student_id: sid, analysis_type: type};
            if (hid) data.homework_id = hid;

            fetch(api('/analysis/generate'), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    log(out, d.data.report);
                } else {
                    log(out, '错误: ' + d.error);
                }
            })
            .catch(e => log(out, '请求失败: ' + e.message));
        };

        // 查询报告
        document.getElementById('queryBtn').onclick = function() {
            var sid = document.getElementById('studentId').value;
            var hid = document.getElementById('homeworkId').value;
            var type = document.getElementById('analysisType').value;
            var out = document.getElementById('reportOutput');

            if (!sid) return alert('请输入学生ID');

            log(out, '正在查询...');

            var url = api('/analysis/query?student_id=' + sid + '&analysis_type=' + type);
            if (hid) url += '&homework_id=' + hid;

            fetch(url)
            .then(r => r.json())
            .then(d => {
                if (d.success && d.data.length > 0) {
                    log(out, d.data[0].report_content);
                } else {
                    log(out, '未找到报告');
                }
            })
            .catch(e => log(out, '请求失败: ' + e.message));
        };

        // 初始化
        document.getElementById('checkBtn').click();
    </script>
</body>
</html>
